name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-backend:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-backend:buildcache,mode=max

      # Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-frontend:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/url-shortener-frontend:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            
            # Set project path
            PROJECT_PATH="${{ secrets.DO_PROJECT_PATH }}"
            REPO_URL="https://github.com/${{ env.GITHUB_OWNER }}/shortenlinks.git"
            
            # Handle repository setup (first run vs subsequent runs)
            if [ -d "$PROJECT_PATH/.git" ]; then
              # Git repository exists, just update it
              echo "✅ Repository exists, updating..."
              cd "$PROJECT_PATH"
              git fetch origin
              git reset --hard HEAD
              git checkout main
              git pull origin main
            elif [ -d "$PROJECT_PATH" ]; then
              # Directory exists but not a git repo, clean and clone
              echo "⚠️  Directory exists but not a git repo, cleaning..."
              rm -rf "$PROJECT_PATH"
              echo "📦 Cloning repository..."
              git clone "$REPO_URL" "$PROJECT_PATH"
              cd "$PROJECT_PATH"
            else
              # Directory doesn't exist, clone it
              echo "📦 Repository not found, cloning..."
              git clone "$REPO_URL" "$PROJECT_PATH"
              cd "$PROJECT_PATH"
            fi
            
            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Create/update .env file
            cat > .env << 'ENVEOF'
            GHCR_USERNAME=${{ env.GITHUB_OWNER }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_FIREBASE_CONFIG=${{ secrets.VITE_FIREBASE_CONFIG }}
            GIN_MODE=release
            ENVEOF
            
            # Pull latest images
            docker pull ghcr.io/${{ env.GITHUB_OWNER }}/url-shortener-backend:latest
            docker pull ghcr.io/${{ env.GITHUB_OWNER }}/url-shortener-frontend:latest
            
            # Deploy with zero downtime
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Wait for services to be healthy
            echo "Waiting for services to be healthy..."
            check_health() {
              for i in {1..12}; do
                STATUS=$(docker inspect -f '{{.State.Health.Status}}' $1 2>/dev/null || echo "missing")
                if [ "$STATUS" = "healthy" ]; then
                  echo "✅ $1 is healthy"
                  return 0
                fi
                echo "⏳ Waiting for $1... (status: $STATUS)"
                sleep 5
              done
              echo "❌ $1 failed to become healthy"
              docker compose -f docker-compose.prod.yml logs $2
              return 1
            }
            
            check_health "url-shortener-backend" "backend" || exit 1
            check_health "url-shortener-frontend" "frontend" || exit 1
            
            # Clean up old images
            docker image prune -f
            
            # Show deployment status
            docker compose -f docker-compose.prod.yml ps
            
            echo "✅ Deployment completed successfully!"
