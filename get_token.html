<!DOCTYPE html>
<html>
<head>
    <title>Get Firebase Token</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #4285F4; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
  <h1>Firebase Token Generator</h1>
  <button id="loginBtn">Login with Google</button>
  
  <h3>Your Token (Copy this):</h3>
  <textarea id="token" rows="10" placeholder="Token will appear here..."></textarea>

  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Your web app's Firebase configuration
    // (I filled this in from your screenshot)
    const firebaseConfig = {
      apiKey: "AIzaSyBhkYR0k8o-dnuDlPR2oR6ToNYSpoQm91A",
      authDomain: "urlshortner-138d6.firebaseapp.com",
      projectId: "urlshortner-138d6",
      storageBucket: "urlshortner-138d6.firebasestorage.app",
      messagingSenderId: "108450218643",
      appId: "1:108450218643:web:ec0f0a7130cb41ebd68366",
      measurementId: "G-WV6NCRZG7X"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Attach click event to the button
    document.getElementById('loginBtn').addEventListener('click', () => {
      signInWithPopup(auth, provider).then((result) => {
        // This gives you a Google Access Token.
        const user = result.user;
        user.getIdToken().then((token) => {
            console.log("Token generated successfully");
            document.getElementById("token").value = token;
            alert("Token generated! Copy it from the text box.");
        });
      }).catch((error) => {
        console.error(error);
        alert("Login failed: " + error.message);
      });
    });
  </script>
</body>
</html>
