apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # URL of the ACME server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address used for ACME registration (IMPORTANT: Change this)
    email: kaveenpsnd@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
